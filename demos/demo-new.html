<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CellAnimator - New Architecture Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: #fff;
            overflow: hidden;
        }

        #container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .cell {
            background: #2a2a2a;
            border: 1px solid #333;
            transition: all 0.3s ease;
        }

        .cell:hover {
            background: #4a4a4a;
        }

        /* Animation keyframes */
        @keyframes pulse {
            0%, 100% {
                background: #2a2a2a;
                transform: scale(1);
            }
            50% {
                background: #00ffff;
                transform: scale(1.2);
            }
        }

        @keyframes wave {
            0%, 100% {
                background: #2a2a2a;
            }
            50% {
                background: #ff00ff;
            }
        }

        @keyframes glow {
            0%, 100% {
                background: #2a2a2a;
                box-shadow: none;
            }
            50% {
                background: #ffff00;
                box-shadow: 0 0 20px #ffff00;
            }
        }

        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 8px;
            z-index: 1000;
            max-width: 250px;
        }

        button {
            display: block;
            width: 100%;
            margin: 8px 0;
            padding: 10px 20px;
            background: #00ffff;
            border: none;
            border-radius: 4px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #00cccc;
        }

        button.danger {
            background: #ff4444;
            color: #fff;
        }

        button.danger:hover {
            background: #cc0000;
        }

        h2 {
            margin-bottom: 15px;
            font-size: 18px;
            color: #00ffff;
        }

        .info {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 8px;
            font-size: 12px;
            font-family: monospace;
        }

        .info div {
            margin: 4px 0;
        }

        .info span {
            color: #00ffff;
            font-weight: bold;
        }

        #eventLog {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 8px;
            max-width: 300px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 11px;
            font-family: monospace;
        }

        #eventLog h3 {
            font-size: 14px;
            margin-bottom: 10px;
            color: #00ffff;
        }

        .event {
            padding: 4px;
            margin: 2px 0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="controls">
        <h2>CellAnimator v2.0</h2>
        <button onclick="animateDiagonal()">Diagonal Pulse</button>
        <button onclick="animateRandom()">Random Glow</button>
        <button onclick="animateWave()">Wave Effect</button>
        <button onclick="animateBorder()">Border Animation</button>
        <button onclick="animateSpiral()">Spiral Pattern</button>
        <button onclick="updateRandomCells()">Update Random Colors</button>
        <button onclick="stopAll()" class="danger">Stop All</button>
        <button onclick="resetAll()" class="danger">Reset All</button>
    </div>

    <div id="container"></div>

    <div class="info">
        <div>Grid: <span id="gridSize">-</span></div>
        <div>Cells: <span id="cellCount">-</span></div>
        <div>Active: <span id="activeCount">0</span></div>
        <div>Mode: <span id="renderMode">-</span></div>
        <div>Click cell to log coords</div>
    </div>

    <div id="eventLog">
        <h3>Event Log</h3>
        <div id="events"></div>
    </div>

    <script src="src/renderers/BaseRenderer.js"></script>
    <script src="src/renderers/HTMLRenderer.js"></script>
    <script src="src/CellAnimator.js"></script>
    <script>
        // Initialize CellAnimator
        let animator;
        let gridInfo;

        async function init() {
            const container = document.getElementById('container');
            
            // Create animator instance
            animator = new CellAnimator({
                width: '100%',
                height: '100%',
                cellWidth: 30,
                cellHeight: 30,
                container: container
            });

            // Register event listeners
            animator.on('gridReady', (info) => {
                logEvent('Grid initialized', info);
                updateInfo(info);
            });

            animator.on('cellClick', (data) => {
                logEvent(`Cell clicked: (${data.x}, ${data.y})`);
                // Flash the clicked cell
                animator.updateCell(data.x, data.y, {
                    background: '#ffffff',
                    transition: 'all 0.3s'
                });
                setTimeout(() => {
                    animator.resetCell(data.x, data.y);
                }, 300);
            });

            animator.on('animationStart', (data) => {
                updateActiveCount();
            });

            animator.on('animationStop', (data) => {
                updateActiveCount();
            });

            // Initialize grid
            gridInfo = await animator.init();
            console.log('CellAnimator initialized:', gridInfo);
        }

        function updateInfo(info) {
            document.getElementById('gridSize').textContent = `${info.columns}x${info.rows}`;
            document.getElementById('cellCount').textContent = info.totalCells;
            document.getElementById('renderMode').textContent = info.renderMode || 'html';
        }

        function updateActiveCount() {
            const count = animator.activeAnimations.size;
            document.getElementById('activeCount').textContent = count;
        }

        function logEvent(message, data) {
            const eventLog = document.getElementById('events');
            const eventDiv = document.createElement('div');
            eventDiv.className = 'event';
            eventDiv.textContent = `${new Date().toLocaleTimeString()}: ${message}`;
            eventLog.insertBefore(eventDiv, eventLog.firstChild);
            
            // Keep only last 10 events
            while (eventLog.children.length > 10) {
                eventLog.removeChild(eventLog.lastChild);
            }
        }

        // Animation Functions
        function animateDiagonal() {
            logEvent('Starting diagonal animation');
            const animations = [];
            const maxDiagonal = Math.min(gridInfo.columns, gridInfo.rows);
            
            for (let i = 0; i < maxDiagonal; i++) {
                animations.push({
                    x: i,
                    y: i,
                    animation: {
                        name: 'pulse',
                        duration: '1s',
                        timing: 'ease-in-out',
                        delay: `${i * 0.1}s`,
                        iteration: 'infinite'
                    }
                });
            }
            
            animator.animateCells(animations);
        }

        function animateRandom() {
            logEvent('Starting random animation');
            const animations = [];
            const count = 50;
            
            for (let i = 0; i < count; i++) {
                const x = Math.floor(Math.random() * gridInfo.columns);
                const y = Math.floor(Math.random() * gridInfo.rows);
                
                animations.push({
                    x: x,
                    y: y,
                    animation: {
                        name: 'glow',
                        duration: `${Math.random() * 2 + 1}s`,
                        timing: 'ease-in-out',
                        delay: `${Math.random()}s`,
                        iteration: 'infinite'
                    }
                });
            }
            
            animator.animateCells(animations);
        }

        function animateWave() {
            logEvent('Starting wave animation');
            const animations = [];
            
            for (let x = 0; x < gridInfo.columns; x++) {
                for (let y = 0; y < gridInfo.rows; y++) {
                    animations.push({
                        x: x,
                        y: y,
                        animation: {
                            name: 'wave',
                            duration: '2s',
                            timing: 'ease-in-out',
                            delay: `${(x + y) * 0.05}s`,
                            iteration: 'infinite'
                        }
                    });
                }
            }
            
            animator.animateCells(animations);
        }

        function animateBorder() {
            logEvent('Starting border animation');
            const animations = [];
            
            // Top and bottom
            for (let x = 0; x < gridInfo.columns; x++) {
                animations.push({
                    x: x,
                    y: 0,
                    animation: {
                        name: 'pulse',
                        duration: '1.5s',
                        timing: 'ease-in-out',
                        delay: `${x * 0.05}s`,
                        iteration: 'infinite'
                    }
                });
                animations.push({
                    x: x,
                    y: gridInfo.rows - 1,
                    animation: {
                        name: 'pulse',
                        duration: '1.5s',
                        timing: 'ease-in-out',
                        delay: `${x * 0.05}s`,
                        iteration: 'infinite'
                    }
                });
            }
            
            // Left and right
            for (let y = 1; y < gridInfo.rows - 1; y++) {
                animations.push({
                    x: 0,
                    y: y,
                    animation: {
                        name: 'pulse',
                        duration: '1.5s',
                        timing: 'ease-in-out',
                        delay: `${y * 0.05}s`,
                        iteration: 'infinite'
                    }
                });
                animations.push({
                    x: gridInfo.columns - 1,
                    y: y,
                    animation: {
                        name: 'pulse',
                        duration: '1.5s',
                        timing: 'ease-in-out',
                        delay: `${y * 0.05}s`,
                        iteration: 'infinite'
                    }
                });
            }
            
            animator.animateCells(animations);
        }

        function animateSpiral() {
            logEvent('Starting spiral animation');
            const animations = [];
            const centerX = Math.floor(gridInfo.columns / 2);
            const centerY = Math.floor(gridInfo.rows / 2);
            
            // Create spiral pattern
            for (let x = 0; x < gridInfo.columns; x++) {
                for (let y = 0; y < gridInfo.rows; y++) {
                    const dx = x - centerX;
                    const dy = y - centerY;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    animations.push({
                        x: x,
                        y: y,
                        animation: {
                            name: 'glow',
                            duration: '2s',
                            timing: 'ease-in-out',
                            delay: `${distance * 0.1}s`,
                            iteration: 'infinite'
                        }
                    });
                }
            }
            
            animator.animateCells(animations);
        }

        function updateRandomCells() {
            logEvent('Updating random cell colors');
            const updates = [];
            const count = 30;
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff'];
            
            for (let i = 0; i < count; i++) {
                const x = Math.floor(Math.random() * gridInfo.columns);
                const y = Math.floor(Math.random() * gridInfo.rows);
                const color = colors[Math.floor(Math.random() * colors.length)];
                
                updates.push({
                    x: x,
                    y: y,
                    styles: {
                        background: color,
                        transition: 'all 0.5s'
                    }
                });
            }
            
            animator.updateCells(updates);
        }

        function stopAll() {
            logEvent('Stopping all animations');
            animator.stopAllAnimations();
            updateActiveCount();
        }

        function resetAll() {
            logEvent('Resetting all cells');
            animator.resetAllCells();
            updateActiveCount();
        }

        // Initialize on page load
        init();
    </script>
</body>
</html>
