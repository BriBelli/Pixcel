<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; }
  #root { height: 100%; }
  .ide-scroll::-webkit-scrollbar { width: 9px; }
  .ide-scroll::-webkit-scrollbar-track { background: transparent; }
  .ide-scroll::-webkit-scrollbar-thumb { background: var(--a2ui-border-default); border-radius: 9999px; }
  .ide-scroll::-webkit-scrollbar-thumb:hover { background: var(--a2ui-border-strong); }
  textarea::placeholder, input::placeholder { color: var(--a2ui-text-tertiary); }
  button { font-family: var(--a2ui-font-family); }
  image-slot { border-radius: 0; }
  /* editable prompt segments — show a faint placeholder when empty */
  .pxs-seg:empty::before, .pxs-seg[data-empty="true"]:not(:focus)::before {
    content: attr(data-ph); color: var(--a2ui-text-disabled); font-style: italic; opacity: 0.7;
  }
  .pxs-seg:focus { background: var(--a2ui-bg-active); }
  /* agent dock motion */
  @keyframes pxs-spin { to { transform: rotate(360deg); } }
  .pxs-spin svg { animation: pxs-spin 0.9s linear infinite; transform-origin: center; }
  @keyframes pxs-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
  .pxs-cursor { display: inline-block; width: 0.55em; height: 1.05em; transform: translateY(2px); margin-left: 2px;
    background: var(--a2ui-text-tertiary); border-radius: 2px; animation: pxs-blink 1s steps(1) infinite; }
  /* response stack (Z-axis) entrance — base state is the visible end-state */
  @keyframes pxs-card-stack { from { opacity: 0; transform: scale(0.965); } to { opacity: 1; transform: none; } }
  @keyframes pxs-card-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pxs-card-slL { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: none; } }
  @keyframes pxs-card-slR { from { opacity: 0; transform: translateX(-40px); } to { opacity: 1; transform: none; } }
  /* landing → working workflow transition */
  @keyframes pxs-land-up-out { from { opacity: 1; transform: none; } to { opacity: 0; transform: translateY(-30px); } }
  @keyframes pxs-work-up-in { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: none; } }
  @keyframes pxs-screen-out { from { opacity: 1; } to { opacity: 0; } }
  @keyframes pxs-screen-in { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pxs-dock-in-r { from { opacity: 0; transform: translateX(48px); } to { opacity: 1; transform: none; } }
  @keyframes pxs-dock-in-l { from { opacity: 0; transform: translateX(-48px); } to { opacity: 1; transform: none; } }
  @keyframes pxs-thread-in { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) {
    [style*="pxs-card"], [style*="pxs-land"], [style*="pxs-work"], [style*="pxs-screen"], [style*="pxs-dock-in"], [style*="pxs-thread"] { animation: none !important; }
  }
</style>
